<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Случайный Лабиринт</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 400px;
            background-color: #fff;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            touch-action: none; /* Отключает прокрутку страницы */
        }

        .wall {
            position: absolute;
            background-color: #333;
        }

        #player {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #ff5722;
            border-radius: 50%;
        }

        #finish {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #4caf50;
            border-radius: 50%;
        }

        #message-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 28px;
            text-align: center;
        }

        #message-overlay button {
            margin-top: 20px;
            padding: 12px 30px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Элементы будут созданы здесь с помощью JavaScript -->
        <div id="player"></div>
        <div id="finish"></div>
        
        <div id="message-overlay">
            <p id="msg-text"></p>
            <button onclick="resetGame()">Начать заново</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const player = document.getElementById('player');
        const finish = document.getElementById('finish');
        const messageOverlay = document.getElementById('message-overlay');
        const msgText = document.getElementById('msg-text');

        const GRID_SIZE = 10; // Размер сетки (10x10)
        const CELL_SIZE = gameContainer.clientWidth / GRID_SIZE; // Размер одной ячейки

        let walls = []; // Массив для хранения всех стен
        let isGameActive = true;

        // --- Инициализация игры ---
        function initGame() {
             // Очищаем старые стены, если они есть
             walls.forEach(wall => wall.remove());
             walls = [];

             // Генерируем новый лабиринт
             const maze = generateMaze();
             createWallsFromMaze(maze);

             // Устанавливаем начальную позицию игрока и финиша
             player.style.left = CELL_SIZE + 'px';
             player.style.top = CELL_SIZE + 'px';
             finish.style.left = (CELL_SIZE * (GRID_SIZE - 1)) + 'px';
             finish.style.top = (CELL_SIZE * (GRID_SIZE - 1)) + 'px';

             isGameActive = true;
             messageOverlay.style.display = 'none';
         }

         // --- Генерация лабиринта ---
         function generateMaze() {
             // Создаем сетку, заполненную стенами (true)
             let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(true));
             
             // Функция для "вырезания" пути
             function carvePassage(x, y) {
                 grid[y][x] = false; // Текущая ячейка - это путь

                 // Определяем непосещенных соседей (вверх, вниз, влево, вправо)
                 const directions = [];
                 if (y > 1 && grid[y-1][x]) directions.push([x, y-2]); // Вверх
                 if (y < GRID_SIZE-2 && grid[y+1][x]) directions.push([x, y+2]); // Вниз
                 if (x > 1 && grid[y][x-1]) directions.push([x-2, y]); // Влево
                 if (x < GRID_SIZE-2 && grid[y][x+1]) directions.push([x+2, y]); // Вправо

                 if (directions.length > 0) {
                     // Выбираем случайное направление
                     const [nextX, nextY] = directions[Math.floor(Math.random() * directions.length)];
                     // "Сносим" стену между текущей ячейкой и следующей
                     grid[Math.floor((y + nextY) / 2)][Math.floor((x + nextX) / 2)] = false;
                     // Рекурсивно продолжаем от следующей ячейки
                     carvePassage(nextX, nextY);
                 }
             }

             // Начинаем генерацию из точки (1,1), чтобы оставить рамку из стен
             carvePassage(1, 1);
             
             return grid;
         }

         // --- Создание стен на странице ---
         function createWallsFromMaze(maze) {
             for (let row = 0; row < GRID_SIZE; row++) {
                 for (let col = 0; col < GRID_SIZE; col++) {
                     if (maze[row][col]) { // Если ячейка - это стена
                         const wall = document.createElement('div');
                         wall.className = 'wall';
                         wall.style.left = (col * CELL_SIZE) + 'px';
                         wall.style.top = (row * CELL_SIZE) + 'px';
                         wall.style.width = CELL_SIZE + 'px';
                         wall.style.height = CELL_SIZE + 'px';
                         gameContainer.appendChild(wall);
                         walls.push(wall);
                     }
                 }
             }
         }


         // --- Логика управления и столкновений ---
         gameContainer.addEventListener('touchmove', function(event) {
             if (!isGameActive) return;
             event.preventDefault();

             const touch = event.touches[0];
             const rect = gameContainer.getBoundingClientRect();
             
             const x = touch.clientX - rect.left - (player.offsetWidth / 2);
             const y = touch.clientY - rect.top - (player.offsetHeight / 2);
             
             player.style.left = x + 'px';
             player.style.top = y + 'px';
             
             checkCollision();
         });

         function checkCollision() {
             const playerRect = player.getBoundingClientRect();
             
             // Проверка выхода за границы лабиринта
             if (playerRect.left < 0 || playerRect.right > gameContainer.clientWidth ||
                 playerRect.top < 0 || playerRect.bottom > gameContainer.clientHeight) {
                 endGame(false);
                 return;
             }
             
             // Проверка столкновения со стенами
             for (let wall of walls) {
                 const wallRect = wall.getBoundingClientRect();
                 if (isIntersecting(playerRect, wallRect)) {
                     endGame(false);
                     return;
                 }
             }
             
             // Проверка достижения финиша
             const finishRect = finish.getBoundingClientRect();
             if (isIntersecting(playerRect, finishRect)) {
                 endGame(true);
                 return;
             }
         }
         
         function isIntersecting(a, b) {
             return a.right > b.left && a.left < b.right && a.bottom > b.top && a.top < b.bottom;
         }
         
         function endGame(isWin) {
             isGameActive = false;
             
             if (isWin) {
                 msgText.textContent = "Победа!";
                 messageOverlay.style.backgroundColor = "rgba(46, 125, 50, 0.7)";
             } else {
                 msgText.textContent = "Стена! Попробуй снова.";
                 messageOverlay.style.backgroundColor = "rgba(173, 34, 34, 0.7)";
             }
             
             messageOverlay.style.display = 'flex';
         }
         
         function resetGame() {
             initGame(); // Генерируем новый лабиринт и сбрасываем игру
         }
         
         // Запускаем игру при загрузке страницы
         initGame();
    </script>
</body>
</html>
