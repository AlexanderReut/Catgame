<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считаем котов!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #faf0e6;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Разносим контент */
            align-items: center;
            overflow: hidden;
        }

        h1, #question {
            color: #8b4513;
            text-align: center;
            z-index: 1;
            width: 90%;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 70%; /* Зона для котов занимает верхние 70% экрана */
            max-height: calc(100vh - 200px); /* Ограничение по высоте */
            pointer-events: none; /* Чтобы клик проходил сквозь пустые места */
        }

        .cat-picture {
            position: absolute;
            width: 150px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            opacity: 0.9;
            user-select: none;
            pointer-events: auto; /* Включаем клики только на самих картинках */
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .cat-picture:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        /* --- СТИЛИ ДЛЯ ЦИФР ---
           Используем Grid для сетки 3x3 внизу */
        #numbers {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Три колонки */
            gap: 15px;
            width: 90%;
            max-width: 360px;
            
            bottom: 5%; /* Расположение от низа */
            left: 50%;
            transform: translateX(-50%);
            
            position: fixed; /* Фиксируем относительно окна браузера */
            pointer-events: auto; /* Кнопки кликабельны */
            z-index: 10;
        }

        button {
            font-size: 2em; /* Крупные цифры */
            padding: 15px;
            border-radius: 15px;
            border: none;
            background-color: #fff8dc;
            color: #a0522d;
            cursor: pointer;
            box-shadow: 0 4px #d2691e;
            transition: all 0.3s ease;
            min-width: 70px;
        }

        button.correct {
             background-color: #98fb98;
             color: #2e7d32;
             box-shadow: 0 4px #4CAF50;
        }

        button.wrong {
             background-color: #ff6347;
             color: white;
             box-shadow: 0 4px #FF4500;
        }
    </style>
</head>
<body>

    <h1>Считаем котов!</h1>

    <!-- Контейнер для зоны с котами -->
    <div id="game-container"></div>

    <div id="question">Сколько котов на крыше?</div>

    <!-- Блок для цифр будет создан скриптом здесь -->
    <div id="numbers"></div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const questionEl = document.getElementById('question');
        const numbersEl = document.getElementById('numbers');

        let correctAnswer;
        const catSize = 150;

        const catImageLinks = [
             'https://placekitten.com/200/200',
             'https://placekitten.com/201/201',
             'https://placekitten.com/202/202'
        ];

        function startGame() {
             // 1. Очистка предыдущего раунда
             gameContainer.innerHTML = '';
             numbersEl.innerHTML = '';
             questionEl.textContent = "Сколько котов на крыше?";
             questionEl.style.color = "#333";

             // 2. Генерация нового ответа
             correctAnswer = Math.floor(Math.random() * (9 - 1 + 1)) + 1;

             // 3. Создание и размещение котов
             for (let i = 0; i < correctAnswer; i++) {
                  const randomIndex = Math.floor(Math.random() * catImageLinks.length);
                  const imgSrc = catImageLinks[randomIndex];

                  const catImg = document.createElement('img');
                  catImg.src = imgSrc;
                  catImg.classList.add('cat-picture');

                  // Координаты X всегда случайные
                  const xPos = Math.random() * (window.innerWidth - catSize);
                  
                  // Координаты Y ограничены высотой контейнера для котов
                  const yPos = Math.random() * (gameContainer.clientHeight - catSize);

                  catImg.style.left = `${xPos}px`;
                  catImg.style.top = `${yPos}px`;

                  gameContainer.appendChild(catImg);
             }

             // 4. Создание кнопок с цифрами (в самом конце)
             for (let num = 1; num <= 9; num++) {
                  const btn = document.createElement('button');
                  btn.textContent = num;
                  btn.value = num;

                  btn.addEventListener('click', function() {
                      if (parseInt(this.value) === correctAnswer) {
                          this.classList.add('correct');
                          questionEl.textContent = "🎉 Верно!";
                          questionEl.style.color = "#2e7d32";
                      } else {
                          this.classList.add('wrong');
                          questionEl.textContent = `😿 Неправильно! Было ${correctAnswer}.`;
                          questionEl.style.color = "#c62828";
                      }
                      document.querySelectorAll('#numbers button').forEach(b => b.disabled = true);
                      setTimeout(startGame, 2000);
                  });
                  numbersEl.appendChild(btn);
              }
         }

         // Запуск игры после полной загрузки страницы
         window.onload = startGame;
    </script>
</body>
</html>
