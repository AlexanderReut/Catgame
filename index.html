<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра Лабиринт</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        #game-container {
            position: relative;
            border: 3px solid #333;
            background-color: #fff;
        }
        
        canvas {
            display: block;
        }
        
        #message {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #d63031;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Лабиринт</h1>
    <div id="game-container">
        <canvas id="maze" width="400" height="400"></canvas>
        <div id="message">Вы прошли лабиринт!</div>
    </div>

    <script>
        const canvas = document.getElementById('maze');
        const ctx = canvas.getContext('2d');
        const message = document.getElementById('message');
        
        // Размеры ячеек лабиринта
        const cellSize = 40;
        const cols = canvas.width / cellSize;
        const rows = canvas.height / cellSize;
        
        // Игрок
        let player = { x: 1, y: 1 };
        
        // Финиш
        let finish = { x: cols - 2, y: rows - 2 };
        
        // Лабиринт (0 — проход, 1 — стена)
        let maze = [];
        
        // Генерация лабиринта (простой алгоритм)
        function generateMaze() {
            maze = Array(rows).fill().map(() => Array(cols).fill(1));
            
            function carve(x, y) {
                maze[y][x] = 0;
                const directions = [[0, -2], [2, 0], [0, 2], [-2, 0]];
                shuffle(directions);
                
                for (const [dx, dy] of directions) {
                    const nx = x + dx;
                    const ny = y + dy;
                    
                    if (nx > 0 && nx < cols - 1 && ny > 0 && ny < rows - 1 && maze[ny][nx] === 1) {
                        maze[y + dy / 2][x + dx / 2] = 0;
                        carve(nx, ny);
                    }
                }
            }
            
            carve(1, 1);
            maze[1][0] = 0; // Вход
            maze[rows - 2][cols - 1] = 0; // Выход
        }
        
        // Перемешивание массива
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        // Отрисовка лабиринта
        function drawMaze() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    if (maze[y][x] === 1) {
                        ctx.fillStyle = '#333';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    } else {
                        ctx.strokeStyle = '#ddd';
                        ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
            
            // Отрисовка игрока
            ctx.fillStyle = '#007bff';
            ctx.beginPath();
            ctx.arc(
                player.x * cellSize + cellSize / 2,
                player.y * cellSize + cellSize / 2,
                cellSize / 3,
                0,
                2 * Math.PI
            );
            ctx.fill();
            
            // Отрисовка финиша
            ctx.fillStyle = '#28a745';
            ctx.fillRect(
                finish.x * cellSize + 5,
                finish.y * cellSize + 5,
                cellSize - 10,
                cellSize - 10
            );
        }
        
        // Проверка победы
        function checkWin() {
            if (player.x === finish.x && player.y === finish.y) {
                message.style.display = 'block';
                setTimeout(() => {
                    message.style.display = 'none';
                    generateMaze();
                    player = { x: 1, y: 1 };
                    drawMaze();
                }, 2000);
            }
        }
        
        // Обработка клавиш
        document.addEventListener('keydown', (e) => {
            let newX = player.x;
            let newY = player.y;
            
            switch (e.key) {
                case 'ArrowUp':
                    newY--;
                    break;
                case 'ArrowDown':
                    newY++;
                    break;
                case 'ArrowLeft':
                    newX--;
                    break;
                case 'ArrowRight':
                    newX++;
                    break;
                default:
                    return;
            }
            
            // Проверка столкновения со стенами
            if (maze[newY][newX] === 0) {
                player.x = newX;
                player.y = newY;
                drawMaze();
                checkWin();
            }
        });
        
        // Инициализация игры
        generateMaze();
        drawMaze();
    </script>
</body>
</html>
