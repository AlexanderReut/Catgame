<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Лабиринт для детей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }
        
        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        #game-container {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        #maze {
            display: grid;
            gap: 2px;
            background: #2c3e50;
            padding: 5px;
            border-radius: 10px;
        }
        
        .cell {
            width: 40px;
            height: 40px;
            background: #34495e;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .wall {
            background: #2c3e50;
        }
        
        .path {
            background: #ecf0f1;
        }
        
        .player {
            background: #34495e;
        }
        
        .player::after {
            content: '😀';
        }
        
        .goal {
            background: #34495e;
        }
        
        .goal::after {
            content: '⭐';
        }
        
        #message {
            color: white;
            font-size: 22px;
            margin-top: 15px;
            text-align: center;
            min-height: 30px;
        }
        
        #restart-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 10px;
            margin-top: 15px;
            cursor: pointer;
            display: none;
        }
        
        #direction-circle {
            width: 180px;
            height: 180px;
            background: #667eea;
            border-radius: 50%;
            margin-top: 15px;
            position: relative;
            cursor: pointer;
        }
        
        #direction-circle:active {
            background: #5a6fd6;
        }
        
        .direction {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #ecf0f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        
        .direction:active {
            background: #d5dbdb;
        }
        
        .direction.up {
            top: 10px;
            left: 65px;
        }
        
        .direction.down {
            bottom: 10px;
            left: 65px;
        }
        
        .direction.left {
            top: 65px;
            left: 10px;
        }
        
        .direction.right {
            top: 65px;
            right: 10px;
        }
        
        .center-dot {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #764ba2;
            border-radius: 50%;
            top: 70px;
            left: 70px;
        }
        
        @media (max-width: 500px) {
            .cell {
                width: 32px;
                height: 32px;
            }
            h1 {
                font-size: 24px;
            }
            #direction-circle {
                width: 150px;
                height: 150px;
            }
            .direction {
                width: 45px;
                height: 45px;
                font-size: 24px;
            }
            .center-dot {
                width: 35px;
                height: 35px;
                top: 57px;
                left: 57px;
            }
        }
    </style>
</head>
<body>
    <h1>🎮 Лабиринт для детей</h1>
    
    <div id="game-container">
        <div id="maze"></div>
        <div id="message"></div>
        <button id="restart-btn" onclick="initGame()">Новый лабиринт</button>
        
        <div id="direction-circle">
            <div class="direction up" onclick="movePlayer(0, -1)">⬆️</div>
            <div class="direction down" onclick="movePlayer(0, 1)">⬇️</div>
            <div class="direction left" onclick="movePlayer(-1, 0)">⬅️</div>
            <div class="direction right" onclick="movePlayer(1, 0)">➡️</div>
            <div class="center-dot"></div>
        </div>
    </div>

    <script>
        const mazeSize = 7;
        let maze = [];
        let playerPos = { x: 1, y: 1 };
        let goalPos = { x: 5, y: 5 };
        
        function generateMaze() {
            maze = [];
            for (let y = 0; y < mazeSize; y++) {
                maze[y] = [];
                for (let x = 0; x < mazeSize; x++) {
                    maze[y][x] = 'wall';
                }
            }
            
            for (let y = 1; y < mazeSize - 1; y++) {
                maze[y][1] = 'path';
                maze[y][mazeSize - 2] = 'path';
            }
            for (let x = 1; x < mazeSize - 1; x++) {
                maze[1][x] = 'path';
                maze[mazeSize - 2][x] = 'path';
            }
            
            for (let i = 0; i < 8; i++) {
                let x = Math.floor(Math.random() * (mazeSize - 2)) + 1;
                let y = Math.floor(Math.random() * (mazeSize - 2)) + 1;
                maze[y][x] = 'path';
            }
            
            maze[1][1] = 'path';
            maze[mazeSize - 2][mazeSize - 2] = 'path';
            
            playerPos = { x: 1, y: 1 };
            goalPos = { x: mazeSize - 2, y: mazeSize - 2 };
        }
        
        function renderMaze() {
            const mazeElement = document.getElementById('maze');
            mazeElement.style.gridTemplateColumns = `repeat(${mazeSize}, 40px)`;
            mazeElement.innerHTML = '';
            
            for (let y = 0; y < mazeSize; y++) {
                for (let x = 0; x < mazeSize; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (maze[y][x] === 'wall') {
                        cell.className += ' wall';
                    } else {
                        cell.className += ' path';
                    }
                    
                    if (x === playerPos.x && y === playerPos.y) {
                        cell.className += ' player';
                    }
                    
                    if (x === goalPos.x && y === goalPos.y) {
                        cell.className += ' goal';
                    }
                    
                    mazeElement.appendChild(cell);
                }
            }
        }
        
        function movePlayer(dx, dy) {
            const newX = playerPos.x + dx;
            const newY = playerPos.y + dy;
            
            if (newX >= 0 && newX < mazeSize && newY >= 0 && newY < mazeSize && 
                maze[newY][newX] === 'path') {
                playerPos = { x: newX, y: newY };
                renderMaze();
                
                if (newX === goalPos.x && newY === goalPos.y) {
                    document.getElementById('message').textContent = '🎉 Ты прошёл лабиринт!';
                    document.getElementById('restart-btn').style.display = 'block';
                }
            }
        }
        
        function initGame() {
            generateMaze();
            renderMaze();
            document.getElementById('message').textContent = '';
            document.getElementById('restart-btn').style.display = 'none';
        }
        
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', function(e) {
            if (e.target.classList.contains('direction')) {
                return;
            }
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, false);
        
        document.addEventListener('touchend', function(e) {
            if (e.target.classList.contains('direction')) {
                return;
            }
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) {
                    movePlayer(dx > 0 ? 1 : -1, 0);
                }
            } else {
                if (Math.abs(dy) > 30) {
                    movePlayer(0, dy > 0 ? 1 : -1);
                }
            }
        }, false);
        
        document.addEventListener('keydown', function(e) {
            switch(e.key) {
                case 'ArrowUp': movePlayer(0, -1); break;
                case 'ArrowDown': movePlayer(0, 1); break;
                case 'ArrowLeft': movePlayer(-1, 0); break;
                case 'ArrowRight': movePlayer(1, 0); break;
            }
        });
        
        initGame();
    </script>
</body>
</html>
