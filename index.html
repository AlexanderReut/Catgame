<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Цветная сетка</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }
        .grid {
            display: grid;
            gap: 2px; /* Расстояние между клетками */
            border: 2px solid #333;
        }
        .cell {
            width: 20px;
            height: 20px;
            background-color: white;
            transition: background-color 0.1s ease-in-out; /* Плавная смена цвета */
        }
        .cell:hover {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="grid" id="pixelCanvas"></div>

<script>
    const container = document.getElementById('pixelCanvas');
    const GRID_SIZE = 16; // Размер сетки (16x16)

    function createGrid(size) {
        // Устанавливаем количество колонок и строк равным 'size'
        container.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        container.style.gridTemplateRows = `repeat(${size}, 1fr)`;

        // Очищаем контейнер перед генерацией новой сетки
        container.innerHTML = '';

        for (let i = 0; i < size * size; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.addEventListener('click', changeColor);
            container.appendChild(cell);
        }
    }

    function getRandomColor() {
        // Генерируем случайный цвет в формате HEX
        return '#' + Math.floor(Math.random()*16777215).toString(16);
    }

    function changeColor(event) {
        event.target.style.backgroundColor = getRandomColor();
    }

    // Инициализация сетки при загрузке страницы
    createGrid(GRID_SIZE);
</script>

</body>
</html>
