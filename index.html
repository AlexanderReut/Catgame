<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабиринт: Удобное управление</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 400px;
            background-color: #fff;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            touch-action: none; /* Отключает прокрутку страницы при касании */
        }

        .wall {
            position: absolute;
            background-color: #333;
        }

        #player {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #ff5722;
            border-radius: 50%;
            top: 10px;
            left: 10px;
        }

        #finish {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #4caf50;
            border-radius: 50%;
            top: 360px;
            left: 360px;
        }

        #message-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 28px;
            text-align: center;
            display: none; /* Скрыт по умолчанию */
        }

        #message-overlay button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Стены лабиринта -->
        <div class="wall" style="top: 0; left: 150px; width: 100px; height: 20px;"></div>
        <div class="wall" style="top: 80px; left: 150px; width: 100px; height: 20px;"></div>
        <div class="wall" style="top: 160px; left: 150px; width: 100px; height: 20px;"></div>

        <div class="wall" style="top: 60px; left: 60px; width: 20px; height: 80px;"></div>
        <div class="wall" style="top: 60px; right: 60px; width: 20px; height: 80px;"></div>

        <div class="wall" style="bottom: 40px; left: 60px; width: 80px; height: 20px;"></div>

        <!-- Игрок и финиш -->
        <div id="player"></div>
        <div id="finish"></div>

        <!-- Сообщение о результате -->
        <div id="message-overlay">
            <p id="msg-text">Стена! Попробуй снова.</p>
            <button onclick="resetGame()">Начать заново</button>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const walls = document.querySelectorAll('.wall');
        const finish = document.getElementById('finish');
        const gameContainer = document.getElementById('game-container');
        const messageOverlay = document.getElementById('message-overlay');
        const msgText = document.getElementById('msg-text');

        let isGameActive = true; // Флаг для проверки состояния игры

        // Управление касанием на игровом поле
        gameContainer.addEventListener('touchmove', function(event) {
             if (!isGameActive) return; // Если игра окончена, ничего не делаем
             event.preventDefault(); // Отменяем прокрутку страницы

             const touch = event.touches[0];
             const rect = gameContainer.getBoundingClientRect();

             // Вычисляем новые координаты, чтобы шарик был под пальцем
             const x = touch.clientX - rect.left - (player.offsetWidth / 2);
             const y = touch.clientY - rect.top - (player.offsetHeight / 2);

             player.style.left = x + 'px';
             player.style.top = y + 'px';

             checkCollision();
         });

         // Проверка столкновений
         function checkCollision() {
             const playerRect = player.getBoundingClientRect();
             const containerRect = gameContainer.getBoundingClientRect();

             // Проверка выхода за границы лабиринта
             if (playerRect.left < containerRect.left ||
                 playerRect.right > containerRect.right ||
                 playerRect.top < containerRect.top ||
                 playerRect.bottom > containerRect.bottom) {
                 endGame(false);
                 return;
             }

             // Проверка столкновения со стенами
             for (let wall of walls) {
                 const wallRect = wall.getBoundingClientRect();
                 if (isIntersecting(playerRect, wallRect)) {
                     endGame(false);
                     return;
                 }
             }

             // Проверка достижения финиша
             const finishRect = finish.getBoundingClientRect();
             if (isIntersecting(playerRect, finishRect)) {
                 endGame(true);
                 return;
             }
         }

         // Вспомогательная функция для проверки пересечения двух элементов
         function isIntersecting(a, b) {
             return a.right > b.left && a.left < b.right && a.bottom > b.top && a.top < b.bottom;
         }

         // Завершение игры
         function endGame(isWin) {
             isGameActive = false; // Останавливаем игру

             if (isWin) {
                 msgText.textContent = "Победа!";
                 messageOverlay.style.backgroundColor = "rgba(46, 125, 50, 0.7)";
             } else {
                 msgText.textContent = "Стена! Попробуй снова.";
                 messageOverlay.style.backgroundColor = "rgba(173, 34, 34, 0.7)";
             }
             messageOverlay.style.display = 'flex';
         }

         // Сброс игры для новой попытки
         function resetGame() {
             player.style.left = '10px';
             player.style.top = '10px';
             messageOverlay.style.display = 'none';
             isGameActive = true;
         }
    </script>
</body>
</html>
