<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра Лабиринт</title>
    <style>
        /* Общие стили */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Контейнер игры */
        #game-container {
            position: relative;
            width: 400px; /* Размер лабиринта */
            height: 400px;
            background-color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            touch-action: none; /* Отключаем стандартное поведение браузера при касании */
        }

        /* Стили для стен лабиринта */
        .wall {
            position: absolute;
            background-color: #333; /* Цвет стен */
        }

        /* Игрок (шарик) */
        #player {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #ff5722; /* Цвет игрока */
            border-radius: 50%; /* Делаем круглым */
            top: 10px; /* Начальная позиция */
            left: 10px;
            touch-action: none; /* Игрок не должен прокручивать страницу */
        }

        /* Финишная точка */
        #finish {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #4caf50; /* Цвет финиша */
            border-radius: 50%;
            top: 360px; /* Позиция финиша */
            left: 360px;
        }

        /* Сообщения о результате */
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: white;
            text-align: center;
            display: none; /* Скрыто по умолчанию */
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Стены лабиринта -->
        <div class="wall" style="top: 0; left: 150px; width: 100px; height: 20px;"></div>
        <div class="wall" style="top: 80px; left: 150px; width: 100px; height: 20px;"></div>
        <div class="wall" style="top: 160px; left: 150px; width: 100px; height: 20px;"></div>

        <div class="wall" style="top: 60px; left: 60px; width: 20px; height: 80px;"></div>
        <div class="wall" style="top: 60px; right: 60px; width: 20px; height: 80px;"></div>

        <div class="wall" style="bottom: 40px; left: 60px; width: 80px; height: 20px;"></div>

        <!-- Игрок -->
        <div id="player"></div>

        <!-- Финиш -->
        <div id="finish"></div>

        <!-- Сообщение о победе/поражении -->
        <div id="message">
            <p id="msg-text"></p>
        </div>
    </div>

    <script>
        const player = document.getElementById('player');
        const walls = document.querySelectorAll('.wall');
        const finish = document.getElementById('finish');
        const gameContainer = document.getElementById('game-container');
        const messageBox = document.getElementById('message');
        const msgText = document.getElementById('msg-text');

        let startX, startY, currentX, currentY;

        // Функция для проверки столкновения со стенами
        function checkCollision() {
            const playerRect = player.getBoundingClientRect();

            // Проверка выхода за границы лабиринта
            if (playerRect.left < gameContainer.getBoundingClientRect().left ||
                playerRect.right > gameContainer.getBoundingClientRect().right ||
                playerRect.top < gameContainer.getBoundingClientRect().top ||
                playerRect.bottom > gameContainer.getBoundingClientRect().bottom) {
                endGame(false);
                return true;
            }

            // Проверка столкновения со стенами
            for (let wall of walls) {
                const wallRect = wall.getBoundingClientRect();
                if (playerRect.right > wallRect.left &&
                    playerRect.left < wallRect.right &&
                    playerRect.bottom > wallRect.top &&
                    playerRect.top < wallRect.bottom) {
                    endGame(false);
                    return true;
                }
            }

            // Проверка достижения финиша
            const finishRect = finish.getBoundingClientRect();
             if (playerRect.right > finishRect.left &&
                 playerRect.left < finishRect.right &&
                 playerRect.bottom > finishRect.top &&
                 playerRect.top < finishRect.bottom) {
                endGame(true);
                return true;
             }

             return false;
        }

        // Функция завершения игры
        function endGame(isWin) {
             if (isWin) {
                 msgText.textContent = "Победа!";
                 messageBox.style.backgroundColor = "#4caf50";
             } else {
                 msgText.textContent = "Стена! Попробуй снова.";
                 messageBox.style.backgroundColor = "#f44336";
             }
             messageBox.style.display = 'block';
             // Удаляем обработчики событий, чтобы остановить игру
             player.removeEventListener('touchmove', onTouchMove);
             player.removeEventListener('touchend', onTouchEnd);
         }

         // Обработчик начала касания
         function onTouchStart(event) {
             event.preventDefault(); // Предотвращаем прокрутку страницы

             const touch = event.touches[0];
             startX = touch.clientX;
             startY = touch.clientY;
             currentX = player.offsetLeft;
             currentY = player.offsetTop;
         }

         // Обработчик движения касания
         function onTouchMove(event) {
             if (!startX) return;
             event.preventDefault();

             const touch = event.touches[0];
             const deltaX = touch.clientX - startX;
             const deltaY = touch.clientY - startY;

             player.style.left = (currentX + deltaX) + 'px';
             player.style.top = (currentY + deltaY) + 'px';
         }

         // Обработчик окончания касания (необязателен для логики, но нужен для очистки)
         function onTouchEnd() {
             startX = null;
         }

         // Добавляем слушатели событий к игроку для управления пальцем
         player.addEventListener('touchstart', onTouchStart);
         player.addEventListener('touchmove', onTouchMove);
         player.addEventListener('touchend', onTouchEnd);
    </script>
</body>
</html>
