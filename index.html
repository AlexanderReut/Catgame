<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считаем котов!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #faf0e6;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Разносим контент */
            align-items: center;
            overflow: hidden;
        }

        h1, #question {
            color: #8b4513;
            text-align: center;
            z-index: 10;
            width: 90%;
        }

        /* Зона для котов занимает всё пространство над цифрами */
        #game-container {
            position: relative;
            width: 100vw;
            height: 70%; /* Верхняя часть экрана */
            max-height: calc(100vh - 200px);
            pointer-events: none;
        }

        .cat-picture {
            position: absolute;
            width: 160px; /* Увеличили размер котов */
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            opacity: 0.95;
            user-select: none;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .cat-picture:hover {
            transform: scale(1.07) rotate(-2deg);
            z-index: 20;
        }

        /* --- СТИЛИ ДЛЯ ЦИФР ---
           Сетка 3x3 внизу экрана */
        #numbers {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Три колонки равной ширины */
            gap: 15px;
            width: 90%;
            max-width: 360px;
            
            bottom: 20px; /* Прижимаем к самому низу */
            left: 50%;
            transform: translateX(-50%);
            
            position: fixed; /* Блок зафиксирован относительно окна */
            pointer-events: auto;
            z-index: 10;
        }

        button {
            font-size: 2em; /* Крупные цифры */
            padding: 15px 25px;
            border-radius: 15px;
            border: none;
            background-color: #fff8dc;
            color: #a0522d;
            cursor: pointer;
            box-shadow: 0 4px #d2691e;
            transition: all 0.3s ease;
            min-width: 70px;
        }

        button.correct {
             background-color: #98fb98;
             color: #2e7d32;
             box-shadow: 0 4px #4CAF50;
        }

        button.wrong {
             background-color: #ff6347;
             color: white;
             box-shadow: 0 4px #FF4500;
        }
    </style>
</head>
<body>

    <h1>Считаем котов!</h1>

    <!-- Контейнер для зоны с котами -->
    <div id="game-container"></div>

    <div id="question">Сколько котов на крыше?</div>

    <!-- Блок для цифр будет создан скриптом здесь -->
    <div id="numbers"></div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const questionEl = document.getElementById('question');
        const numbersEl = document.getElementById('numbers');

        let correctAnswer;
        const catSize = 160;
        const MAX_ATTEMPTS = 100; // Лимит попыток найти место

        const catImageLinks = [
             'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota52.png',
    'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota46.png',
    'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota44.png',
'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota39.png',
'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota37.png'
        ];

        function startGame() {
             gameContainer.innerHTML = '';
             numbersEl.innerHTML = '';
             questionEl.textContent = "Сколько котов на крыше?";
             questionEl.style.color = "#333";

             correctAnswer = Math.floor(Math.random() * (9 - 1 + 1)) + 1;
             const placedCats = []; // Массив {x, y} для уже размещенных котов

             for (let i = 0; i < correctAnswer; i++) {
                  let attempts = 0;
                  let validPositionFound = false;
                  let newCatPos;

                  while (!validPositionFound && attempts < MAX_ATTEMPTS) {
                      attempts++;
                      
                      // Генерируем случайную позицию по X
                      const xPos = Math.random() * (window.innerWidth - catSize);
                      
                      /*
                       * Генерируем позицию по Y.
                       * Используем координату верха блока #numbers как верхнюю границу.
                       * Кот должен поместиться ПОЛНОСТЬЮ выше этой линии.
                       */
                      const numbersRect = numbersEl.getBoundingClientRect();
                      const availableHeight = numbersRect.top - catSize;

                      if (availableHeight <= 0) break; // Нет места для кота
                      
                      const yPos = Math.random() * availableHeight;

                      newCatPos = {x: xPos, y: yPos};

                      // Проверка пересечения с другими котами
                      if (placedCats.length === 0) {
                          validPositionFound = true;
                      } else {
                          let noCollision = true;
                          for (const pos of placedCats) {
                              const overlapX = newCatPos.x < pos.x + catSize && newCatPos.x + catSize > pos.x;
                              const overlapY = newCatPos.y < pos.y + catSize && newCatPos.y + catSize > pos.y;
                              if (overlapX && overlapY) {
                                  noCollision = false;
                                  break;
                              }
                          }
                          validPositionFound = noCollision;
                      }
                  }

                  if (validPositionFound) {
                      placedCats.push(newCatPos);

                      const randomIndex = Math.floor(Math.random() * catImageLinks.length);
                      const imgSrc = catImageLinks[randomIndex];

                      const catImg = document.createElement('img');
                      catImg.src = imgSrc;
                      catImg.classList.add('cat-picture');
                      catImg.style.left = `${newCatPos.x}px`;
                      catImg.style.top = `${newCatPos.y}px`;

                      gameContainer.appendChild(catImg);
                  }
              }

              for (let num = 1; num <= 9; num++) {
                   const btn = document.createElement('button');
                   btn.textContent = num;
                   btn.value = num;

                   btn.addEventListener('click', function() {
                       if (parseInt(this.value) === correctAnswer) {
                           this.classList.add('correct');
                           questionEl.textContent = "🎉 Верно!";
                           questionEl.style.color = "#2e7d32";
                       } else {
                           this.classList.add('wrong');
                           questionEl.textContent = `😿 Неправильно! Было ${correctAnswer}.`;
                           questionEl.style.color = "#c62828";
                       }
                       document.querySelectorAll('#numbers button').forEach(b => b.disabled = true);
                       setTimeout(startGame, 2000);
                   });
                   numbersEl.appendChild(btn);
               }
         }

         window.onload = startGame;
    </script>
</body>
</html>
