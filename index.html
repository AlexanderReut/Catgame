<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считаем котов!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #faf0e6;
            margin: 0;
            height: 100vh;
            overflow: hidden; /* Убираем прокрутку */
            position: relative; /* Это важно для абсолютного позиционирования котов */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Разносим контент по высоте */
        }

        h1 {
            color: #8b4513;
            text-align: center;
            padding-top: 20px;
            z-index: 1;
        }

        #question {
            text-align: center;
            font-size: 2em;
            margin: 20px 0;
            color: #333;
            z-index: 1;
        }

        /* --- СТИЛИ ДЛЯ ЦИФР ---
           Используем Grid для сетки 3x3 и фиксируем блок внизу */
        #numbers {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Три колонки равной ширины */
            gap: 15px; /* Расстояние между кнопками */
            width: 90%;
            max-width: 360px; /* Ограничиваем макс. ширину */
            margin: 0 auto; /* Центрируем блок */
            
            bottom: 10%; /* Расположение от низа экрана */
            left: 50%;
            transform: translateX(-50%);
            
            position: fixed; /* Блок зафиксирован относительно окна браузера */
            pointer-events: auto;
            z-index: 10;
        }

        button {
            font-size: 2em; /* Крупные цифры */
            padding: 15px;
            border-radius: 15px;
            border: none;
            background-color: #fff8dc;
            color: #a0522d;
            cursor: pointer;
            box-shadow: 0 4px #d2691e;
            transition: all 0.3s ease;
            min-width: 70px;
        }

        button.correct {
             background-color: #98fb98;
             color: #2e7d32;
             box-shadow: 0 4px #4CAF50;
        }

        button.wrong {
             background-color: #ff6347;
             color: white;
             box-shadow: 0 4px #FF4500;
        }

        .cat-picture {
            position: absolute;
            width: 150px; /* Размер кота */
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            opacity: 0.9;
            user-select: none;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .cat-picture:hover {
            transform: scale(1.05);
            z-index: 20;
        }
    </style>
</head>
<body>

    <!-- Заголовок -->
    <h1>Считаем котов!</h1>

    <!-- Контейнер для котов -->
    <div id="game-container"></div>

    <!-- Вопрос -->
    <div id="question">Сколько котов на крыше?</div>

    <!-- Кнопки с цифрами -->
    <div id="numbers"></div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const questionEl = document.getElementById('question');
        const numbersEl = document.getElementById('numbers');

        let correctAnswer;
        const catSize = 150;

        const catImageLinks = [
             'https://placekitten.com/200/200',
             'https://placekitten.com/201/201',
             'https://placekitten.com/202/202'
        ];

        function startGame() {
             // Очистка предыдущего раунда
             gameContainer.innerHTML = '';
             numbersEl.innerHTML = '';
             questionEl.textContent = "Сколько котов на крыше?";
             questionEl.style.color = "#333";

             // Генерация нового ответа
             correctAnswer = Math.floor(Math.random() * (9 - 1 + 1)) + 1;

             /*
              * Получаем координаты блока с цифрами один раз,
              * чтобы коты не появлялись под ним.
              */
             const numbersRect = document.getElementById('numbers').getBoundingClientRect();
             
             for (let i = 0; i < correctAnswer; i++) {
                  let validPositionFound = false;
                  let newCatPos;

                  // Пробуем найти валидную позицию
                  while (!validPositionFound) {
                      const xPos = Math.random() * (window.innerWidth - catSize);
                      
                      // Максимальная высота Y - это верх блока с цифрами минус размер кота
                      const maxY = numbersRect.top - catSize;
                      
                      if (maxY <= 0) break; // Если места нет, выходим из цикла
                      
                      const yPos = Math.random() * maxY;

                      newCatPos = {x: xPos, y: yPos};
                      validPositionFound = true;
                  }

                  // Создаем картинку кота
                  const randomIndex = Math.floor(Math.random() * catImageLinks.length);
                  const imgSrc = catImageLinks[randomIndex];

                  const catImg = document.createElement('img');
                  catImg.src = imgSrc;
                  catImg.classList.add('cat-picture');
                  catImg.style.left = `${newCatPos.x}px`;
                  catImg.style.top = `${newCatPos.y}px`;

                  gameContainer.appendChild(catImg);
             }

             // Создание кнопок с цифрами
             for (let num = 1; num <= 9; num++) {
                  const btn = document.createElement('button');
                  btn.textContent = num;
                  btn.value = num;

                  btn.addEventListener('click', function() {
                      if (parseInt(this.value) === correctAnswer) {
                          this.classList.add('correct');
                          questionEl.textContent = "🎉 Верно!";
                          questionEl.style.color = "#2e7d32";
                      } else {
                          this.classList.add('wrong');
                          questionEl.textContent = `😿 Неправильно! Было ${correctAnswer}.`;
                          questionEl.style.color = "#c62828";
                      }
                      document.querySelectorAll('#numbers button').forEach(b => b.disabled = true);
                      setTimeout(startGame, 2000);
                  });
                  numbersEl.appendChild(btn);
              }
         }

         // Запуск игры при загрузке страницы
         startGame();
    </script>
</body>
</html>
