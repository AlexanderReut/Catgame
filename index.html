<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считаем котов!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #faf0e6;
            margin: 0;
            overflow: hidden; /* Убираем скролл */
            position: relative;
            height: 100vh;
        }

        h1 {
            color: #8b4513;
            text-align: center;
            padding-top: 20px;
            z-index: 10;
        }

        #question {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #333;
            z-index: 10;
        }

        /* --- ИЗМЕНЕНИЯ ДЛЯ ЦИФР ---
           Используем GRID для создания сетки 3x3 */
        #numbers {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Три колонки равной ширины */
            gap: 15px; /* Расстояние между кнопками */
            
            justify-content: center; /* Центрируем сетку по горизонтали */
            
            bottom: 15%; /* Располагаем блок выше от низа */
            left: 50%;
            transform: translateX(-50%);
            
            width: 90%; /* Ширина сетки */
            max-width: 360px; /* Максимальная ширина для красоты */
            
            z-index: 10;
            pointer-events: auto;
        }

        button {
            font-size: 2.5em; /* Очень крупные цифры */
            padding: 20px;
            border-radius: 18px;
            border: none;
            background-color: #fff8dc;
            color: #a0522d;
            cursor: pointer;
            box-shadow: 0 6px #d2691e;
            transition: all 0.3s ease;
            min-width: 80px;
        }

        button.correct {
             background-color: #98fb98;
             color: #2e7d32;
             box-shadow: 0 6px #4CAF50;
        }

        button.wrong {
             background-color: #ff6347;
             color: white;
             box-shadow: 0 6px #FF4500;
        }

        .cat-picture {
            position: absolute;
            width: 180px; /* Увеличили размер котов */
            height: auto;
            border-radius: 20px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2), inset 0 0 0 4px rgba(255,255,255,0.3);
            opacity: 0.95;
            user-select: none;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
        }
        .cat-picture:hover {
            transform: scale(1.1) rotate(3deg);
            filter: brightness(1.1);
            z-index: 20;
        }
    </style>
</head>
<body>

    <h1>Считаем котов!</h1>
    <div id="game-container"></div>
    <div id="question">Сколько котов на крыше?</div>
    <div id="numbers"></div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const questionEl = document.getElementById('question');
        const numbersEl = getComputedStyle(document.getElementById('numbers')); // Получаем стили чисел
        
        let correctAnswer = Math.floor(Math.random() * (9 - 1 + 1)) + 1;
        const catSize = 180;

        const catImageLinks = [
             'https://placekitten.com/200/200',
             'https://placekitten.com/201/201',
             'https://placekitten.com/202/202'
        ];

        function startGame() {
             gameContainer.innerHTML = '';
             numbersEl.innerHTML = ''; // Очищаем кнопки перед созданием новых
             questionEl.textContent = "Сколько котов на крыше?";
             questionEl.style.color = "#333";
             correctAnswer = Math.floor(Math.random() * (9 - 1 + 1)) + 1;

             const placedCats = [];

             for (let i = 0; i < correctAnswer; i++) {
                  let validPositionFound = false;
                  let newCatPos;
                  
                  while (!validPositionFound) {
                      const xPos = Math.random() * (window.innerWidth - catSize);
                      
                      /*
                       * Вычисляем верхнюю границу для Y.
                       * Мы берем координату top блока #numbers и вычитаем высоту кота,
                       * чтобы он гарантированно поместился над числами.
                       */
                      const numbersRect = document.getElementById('numbers').getBoundingClientRect();
                      const maxY = numbersRect.top - catSize;

                      if (maxY <= 0) break; // Если места нет (маленький экран), прерываем цикл
                      
                      const yPos = Math.random() * maxY;

                      newCatPos = {x: xPos, y: yPos};

                      // Проверка на пересечение с другими котами
                      if (placedCats.length === 0) {
                          validPositionFound = true;
                      } else {
                          let noCollision = true;
                          for (const pos of placedCats) {
                              const overlapX = newCatPos.x < pos.x + catSize && newCatPos.x + catSize > pos.x;
                              const overlapY = newCatPos.y < pos.y + catSize && newCatPos.y + catSize > pos.y;
                              if (overlapX && overlapY) {
                                  noCollision = false;
                                  break;
                              }
                          }
                          validPositionFound = noCollision;
                      }
                  }

                  if (validPositionFound) {
                      placedCats.push(newCatPos);

                      const randomIndex = Math.floor(Math.random() * catImageLinks.length);
                      const imgSrc = catImageLinks[randomIndex];

                      const catImg = document.createElement('img');
                      catImg.src = imgSrc;
                      catImg.classList.add('cat-picture');
                      catImg.style.left = `${newCatPos.x}px`;
                      catImg.style.top = `${newCatPos.y}px`;

                      gameContainer.appendChild(catImg);
                  }
             }

             // Создаем кнопки в сетке 3x3
             for (let num = 1; num <= 9; num++) {
                  const btn = document.createElement('button');
                  btn.textContent = num;
                  btn.value = num;

                  btn.addEventListener('click', function() {
                      if (parseInt(this.value) === correctAnswer) {
                          this.classList.add('correct');
                          questionEl.textContent = "🎉 Верно!";
                          questionEl.style.color = "#2e7d32";
                      } else {
                          this.classList.add('wrong');
                          questionEl.textContent = `😿 Неправильно! Было ${correctAnswer}.`;
                          questionEl.style.color = "#c62828";
                      }
                      document.querySelectorAll('#numbers button').forEach(b => b.disabled = true);
                      setTimeout(startGame, 2000);
                  });
                  numbersEl.appendChild(btn);
              }
         }

         startGame();
    </script>
</body>
</html>
