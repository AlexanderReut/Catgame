<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Лабиринт для планшета</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .game-container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 95vw;
            max-height: 95vh;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .info {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        #maze {
            display: grid;
            gap: 2px;
            background: #333;
            padding: 5px;
            border-radius: 10px;
            margin: 0 auto;
            touch-action: none;
        }
        
        .cell {
            width: 35px;
            height: 35px;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            cursor: pointer;
        }
        
        .wall {
            background: #333;
        }
        
        .path {
            background: #f0f0f0;
        }
        
        .ball {
            background: #e74c3c !important;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .ball:active {
            transform: scale(0.95);
        }
        
        .goal {
            background: #2ecc71 !important;
            border-radius: 50%;
            width: 28px;
            height: 28px;
        }
        
        .message {
            margin-top: 15px;
            padding: 12px;
            background: #2ecc71;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            font-size: 16px;
        }
        
        .btn {
            margin-top: 15px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .btn:active {
            transform: translateY(2px);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 Лабиринт</h1>
        <p class="info">Нажми на шарик, чтобы переместиться в соседнюю клетку</p>
        <div id="maze"></div>
        <div id="message" class="message">🎉 Ты прошел лабиринт!</div>
        <button class="btn" onclick="initGame()">Новая игра</button>
    </div>

    <script>
        const mazeSize = 11;
        let maze = [];
        let ballPos = { x: 1, y: 1 };
        let goalPos = { x: 9, y: 9 };
        
        // Генерация лабиринта с помощью алгоритма DFS
        function generateMaze() {
            maze = [];
            for (let i = 0; i < mazeSize; i++) {
                maze[i] = [];
                for (let j = 0; j < mazeSize; j++) {
                    maze[i][j] = 1; // 1 = стена, 0 = путь
                }
            }
            
            const stack = [{ x: 1, y: 1 }];
            maze[1][1] = 0;
            
            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const neighbors = [];
                
                const directions = [
                    { x: 0, y: -2 },
                    { x: 0, y: 2 },
                    { x: -2, y: 0 },
                    { x: 2, y: 0 }
                ];
                
                for (const dir of directions) {
                    const nx = current.x + dir.x;
                    const ny = current.y + dir.y;
                    
                    if (nx > 0 && nx < mazeSize - 1 && ny > 0 && ny < mazeSize - 1 && maze[ny][nx] === 1) {
                        neighbors.push({ x: nx, y: ny, dx: dir.x, dy: dir.y });
                    }
                }
                
                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    maze[next.y][next.x] = 0;
                    maze[current.y + next.dy/2][current.x + next.dx/2] = 0;
                    stack.push({ x: next.x, y: next.y });
                } else {
                    stack.pop();
                }
            }
            
            // Гарантия, что цель доступна
            maze[goalPos.y][goalPos.x] = 0;
        }
        
        function initGame() {
            generateMaze();
            ballPos = { x: 1, y: 1 };
            goalPos = { x: mazeSize - 2, y: mazeSize - 2 };
            maze[goalPos.y][goalPos.x] = 0;
            drawMaze();
            document.getElementById('message').style.display = 'none';
        }
        
        function drawMaze() {
            const mazeDiv = document.getElementById('maze');
            mazeDiv.style.gridTemplateColumns = `repeat(${mazeSize}, 35px)`;
            mazeDiv.innerHTML = '';
            
            for (let y = 0; y < mazeSize; y++) {
                for (let x = 0; x < mazeSize; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (maze[y][x] === 1) {
                        cell.className += ' wall';
                    } else {
                        cell.className += ' path';
                    }
                    
                    if (x === ballPos.x && y === ballPos.y) {
                        cell.className += ' ball';
                        cell.onclick = () => moveBall(x, y);
                    } else if (x === goalPos.x && y === goalPos.y) {
                        cell.className += ' goal';
                    }
                    
                    mazeDiv.appendChild(cell);
                }
            }
        }
        
        function moveBall(currentX, currentY) {
            const directions = [
                { x: 0, y: -1 },
                { x: 0, y: 1 },
                { x: -1, y: 0 },
                { x: 1, y: 0 }
            ];
            
            for (const dir of directions) {
                const newX = currentX + dir.x;
                const newY = currentY + dir.y;
                
                if (newX >= 0 && newX < mazeSize && newY >= 0 && newY < mazeSize && maze[newY][newX] === 0) {
                    ballPos = { x: newX, y: newY };
                    drawMaze();
                    
                    if (newX === goalPos.x && newY === goalPos.y) {
                        document.getElementById('message').style.display = 'block';
                    }
                    return;
                }
            }
        }
        
        initGame();
    </script>
</body>
</html>
