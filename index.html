<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считаем котов!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #faf0e6;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Разносим контент */
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        h1, #question {
            color: #8b4513;
            text-align: center;
            z-index: 2;
            width: 90%;
        }

        /* Зона над цифрами, где могут быть коты */
        .game-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 35%; /* Котам доступна верхняя часть экрана */
            pointer-events: none; /* Клик проходит сквозь пустые места */
        }

        .cat-picture {
            position: absolute;
            width: 170px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
            opacity: 0.95;
            user-select: none;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
        }
        .cat-picture:hover {
            transform: scale(1.08) rotate(-2deg);
            filter: brightness(1.1);
            z-index: 20;
        }

        /* --- СТИЛИ ДЛЯ ЦИФР ---
           Сетка 3x3 внизу экрана */
        #numbers {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Три колонки равной ширины */
            gap: 20px; /* Увеличенное расстояние */
            
            bottom: 5%; /* Расположение от низа */
            left: 50%;
            transform: translateX(-50%);
            
            position: fixed; /* Блок зафиксирован относительно окна браузера */
            pointer-events: auto;
            z-index: 1; /* Ниже котов */
            background-color: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 20px;
        }

        button {
            font-size: 2.5em; /* Очень крупные цифры */
            padding: 20px;
            border-radius: 18px;
            border: none;
            background-color: #fff8dc;
            color: #a0522d;
            cursor: pointer;
            box-shadow: 0 6px #d2691e;
            transition: all 0.3s ease;
            min-width: 80px;
        }

        button.correct {
             background-color: #98fb98;
             color: #2e7d32;
             box-shadow: 0 6px #4CAF50;
        }

        button.wrong {
             background-color: #ff6347;
             color: white;
             box-shadow: 0 6px #FF4500;
        }
    </style>
</head>
<body>
