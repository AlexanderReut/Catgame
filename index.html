<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считаем котов!</title>
    <style>
        /* Общий стиль страницы */
        body {
            margin: 0;
            height: 100vh; /* Высота всего экрана */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Разносим элементы по вертикали */
            align-items: center;
            background-color: #faf0e6;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }

        h1, #question {
            color: #8b4513;
            text-align: center;
            width: 90%;
        }

        /* --- ЗОНА ДЛЯ КОТОВ ---
           Занимает всё пространство над цифрами */
        .game-area {
            position: relative; /* Котам задаем позицию относительно этого блока */
            width: 100vw; /* Вся ширина экрана */
            height: 70%; /* Верхние 70% высоты */
            max-height: calc(100vh - 200px); /* Ограничение для маленьких экранов */
            pointer-events: none; /* Чтобы можно было кликать сквозь пустые места */
        }

        .cat-picture {
            position: absolute;
            width: 150px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            opacity: 0.9;
            user-select: none;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .cat-picture:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        /* --- БЛОК С ЦИФРАМИ ---
           Располагаем внизу экрана */
        #numbers {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Создаем сетку 3x3 */
            gap: 15px;
            padding: 15px;
            
            bottom: 20px; /* Отступ от нижнего края */
            left: 50%;
            transform: translateX(-50%);
            
            position: fixed; /* Фиксируем блок внизу окна */
            z-index: 10; /* Выше фона, но ниже котов (которые будут иметь auto) */
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
        }

        button {
            font-size: 2em; /* Очень крупные цифры */
            padding: 15px 25px;
            border-radius: 15px;
            border: none;
            background-color: #fff8dc;
            color: #a0522d;
            cursor: pointer;
            box-shadow: 0 4px #d2691e;
            transition: all 0.3s ease;
            min-width: 70px;
        }

        button.correct {
             background-color: #98fb98;
             color: #2e7d32;
             box-shadow: 0 4px #4CAF50;
        }

        button.wrong {
             background-color: #ff6347;
             color: white;
             box-shadow: 0 4px #FF4500;
        }
    </style>
</head>
<body>

    <h1>Считаем котов!</h1>

    <!-- Контейнер для зоны с котами -->
    <div class="game-area"></div>

    <div id="question">Сколько котов на крыше?</div>

    <!-- Блок для цифр будет создан скриптом здесь -->
    <div id="numbers"></div>

    <script>
        const gameArea = document.querySelector('.game-area');
        const questionEl = document.getElementById('question');
        const numbersEl = document.getElementById('numbers');

        let correctAnswer;
        const catSize = 150;
        const MAX_ATTEMPTS = 50; // Лимит попыток найти место для кота

        const catImages = [
            'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota52.png',
    'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota46.png',
    'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota44.png',
'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota39.png',
'https://www.youloveit.ru/uploads/gallery/thumb/995/youloveit_ru_kartinki_tri_kota37.png'
        ];

        function startGame() {
            // Очистка предыдущего раунда
            gameArea.innerHTML = '';
            numbersEl.innerHTML = '';
            questionEl.textContent = "Сколько котов на крыше?";
            questionEl.style.color = "#333";

            // Генерация нового ответа
            correctAnswer = Math.floor(Math.random() * 9) + 1;

            // Массив для хранения позиций уже размещенных котов
            const placedCats = [];

            // Размещаем котов
            for (let i = 0; i < correctAnswer; i++) {
                let attempts = 0;
                let validPositionFound = false;
                let newCatPos;

                while (!validPositionFound && attempts < MAX_ATTEMPTS) {
                    attempts++;

                    // Генерируем случайные координаты внутри игровой зоны
                    const xPos = Math.random() * (window.innerWidth - catSize);
                    const yPos = Math.random() * (gameArea.clientHeight - catSize);

                    newCatPos = { x: xPos, y: yPos };

                    // Проверяем, не пересекается ли новый кот с уже стоящими
                    if (placedCats.length === 0) {
                        validPositionFound = true;
                    } else {
                        let noCollision = true;
                        for (const pos of placedCats) {
                            // Проверка пересечения прямоугольников
                            const overlapX = newCatPos.x < pos.x + catSize && newCatPos.x + catSize > pos.x;
                            const overlapY = newCatPos.y < pos.y + catSize && newCatPos.y + catSize > pos.y;
                            if (overlapX && overlapY) {
                                noCollision = false;
                                break;
                            }
                        }
                        validPositionFound = noCollision;
                    }
                }

                // Если позиция найдена, добавляем кота на экран
                if (validPositionFound) {
                    placedCats.push(newCatPos);

                    const img = document.createElement('img');
                    img.src = catImages[Math.floor(Math.random() * catImages.length)];
                    img.classList.add('cat-picture');
                    img.style.left = `${newCatPos.x}px`;
                    img.style.top = `${newCatPos.y}px`;
                    gameArea.appendChild(img);
                }
            }

            // Создаем кнопки с цифрами
            for (let num = 1; num <= 9; num++) {
                const btn = document.createElement('button');
                btn.textContent = num;
                btn.value = num;

                btn.addEventListener('click', function () {
                    if (parseInt(this.value) === correctAnswer) {
                        this.classList.add('correct');
                        questionEl.textContent = "🎉 Верно!";
                        questionEl.style.color = "#2e7d32";
                    } else {
                        this.classList.add('wrong');
                        questionEl.textContent = `😿 Неправильно! Было ${correctAnswer}.`;
                        questionEl.style.color = "#c62828";
                    }
                    // Блокируем все кнопки после клика
                    document.querySelectorAll('#numbers button').forEach(b => b.disabled = true);
                    // Перезапуск через 2 секунды
                    setTimeout(startGame, 2000);
                });
                numbersEl.appendChild(btn);
            }
        }

        // Запуск игры после полной загрузки страницы
        window.onload = startGame;
    </script>
</body>
</html>
