<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабиринт</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 400px;
            background-color: #fff;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            touch-action: none; /* Критически важно для отключения прокрутки браузера */
        }

        .wall {
            position: absolute;
            background-color: #333;
        }

        #player {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #ff5722; /* Цвет игрока */
            border-radius: 50%;
        }

        #finish {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #4caf50; /* Цвет финиша */
            border-radius: 50%;
        }

        #message-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 28px;
            text-align: center;
        }

        #message-overlay button {
            margin-top: 20px;
            padding: 12px 30px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Стены будут созданы здесь с помощью JavaScript -->

        <div id="player"></div>
        <div id="finish"></div>

        <div id="message-overlay">
            <p id="msg-text">Стена! Попробуй снова.</p>
            <button onclick="resetGame()">Начать заново</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const player = document.getElementById('player');
        const finish = document.getElementById('finish');
        const messageOverlay = document.getElementById('message-overlay');
        const msgText = document.getElementById('msg-text');

        const GRID_SIZE = 12; // Размер сетки (12x12 для более интересного лабиринта)
        const CELL_SIZE = gameContainer.clientWidth / GRID_SIZE; // Размер одной ячейки
        let walls = []; // Массив для хранения элементов-стен
        let isGameActive = true;

         // --- Инициализация игры ---
         function initGame() {
             // Удаляем старые стены
             walls.forEach(wall => wall.remove());
             walls = [];

             // Генерируем и отрисовываем новый лабиринт
             const maze = generateMaze();
             createWallsFromMaze(maze);

             // Устанавливаем начальную позицию игрока и финиша
             player.style.left = CELL_SIZE + 'px';
             player.style.top = CELL_SIZE + 'px';
             finish.style.left = (CELL_SIZE * (GRID_SIZE - 2)) + 'px';
             finish.style.top = (CELL_SIZE * (GRID_SIZE - 2)) + 'px';

             // Сбрасываем сообщение и флаг игры
             messageOverlay.style.display = 'none';
             isGameActive = true;
         }

         // --- Генерация лабиринта (алгоритм Прима) ---
         function generateMaze() {
             // Создаем сетку, заполненную стенами (true)
             let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(true));
             
             // Список ячеек-"фронтира" (стены рядом с путем)
             let frontier = [];
             
             // Выбираем случайную стартовую точку и делаем её путем
             let startX = Math.floor(Math.random() * (GRID_SIZE/2)) * 2 + 1;
             let startY = Math.floor(Math.random() * (GRID_SIZE/2)) * 2 + 1;
             grid[startY][startX] = false;

             // Добавляем соседние стены стартовой точки во "фронтир"
             addFrontierCells(startX, startY);

             // Пока есть ячейки во "фронтире"
             while (frontier.length > 0) {
                 // Выбираем случайную ячейку из "фронтира"
                 let index = Math.floor(Math.random() * frontier.length);
                 let [x, y] = frontier.splice(index, 1)[0];

                 // Проверяем соседей-кандидатов (через одну ячейку)
                 let neighbors = [];
                 if (y >= 2 && !grid[y-2][x]) neighbors.push([x, y-2, x, y-1]); // Сверху
                 if (y < GRID_SIZE-2 && !grid[y+2][x]) neighbors.push([x, y+2, x, y+1]); // Снизу
                 if (x >= 2 && !grid[y][x-2]) neighbors.push([x-2, y, x-1, y]); // Слева
                 if (x < GRID_SIZE-2 && !grid[y][x+2]) neighbors.push([x+2, y, x+1, y]); // Справа

                 if (neighbors.length) {
                     // Выбираем случайного соседа и "пробиваем" к нему путь
                     let [nx, ny, wx, wy] = neighbors[Math.floor(Math.random() * neighbors.length)];
                     grid[ny][nx] = false; // Делаем соседа путем
                     grid[wy][wx] = false; // Сносим стену между ними

                     // Добавляем новых соседей в "фронтир"
                     addFrontierCells(nx, ny);
                 }
             }
             return grid;
         }

         function addFrontierCells(x, y) {
             if (y >= 2) wallsToFrontier(x, y-2);
             if (y < GRID_SIZE-2) wallsToFrontier(x, y+2);
             if (x >= 2) wallsToFrontier(x-2, y);
             if (x < GRID_SIZE-2) wallsToFrontier(x+2, y);
         }

         function wallsToFrontier(x, y) {
             if (grid[y][x]) { // Если это стена
                 frontier.push([x, y]);
                 grid[y][x] = false; // Помечаем как посещенную, чтобы не добавлять снова
             }
         }

         // --- Создание стен на странице ---
         function createWallsFromMaze(maze) {
             for (let row = 0; row < GRID_SIZE; row++) {
                 for (let col = 0; col < GRID_SIZE; col++) {
                     if (maze[row][col]) { // Если ячейка - это стена
                         const wall = document.createElement('div');
                         wall.className = 'wall';
                         wall.style.left = (col * CELL_SIZE) + 'px';
                         wall.style.top = (row * CELL_SIZE) + 'px';
                         wall.style.width = CELL_SIZE + 'px';
                         wall.style.height = CELL_SIZE + 'px';
                         gameContainer.appendChild(wall);
                         walls.push(wall);
                     }
                 }
             }
         }


         // --- Логика управления и столкновений ---
         gameContainer.addEventListener('touchmove', function(event) {
              if (!isGameActive) return; // Если игра окончена, ничего не делаем

              event.preventDefault(); // Отменяем прокрутку страницы

              const touch = event.touches[0];
              const rect = gameContainer.getBoundingClientRect();

              // Вычисляем координаты касания относительно игрового поля
              const x = touch.clientX - rect.left - (player.offsetWidth / 2);
              const y = touch.clientY - rect.top - (player.offsetHeight / 2);

              // Перемещаем игрока в координаты касания
              player.style.left = x + 'px';
              player.style.top = y + 'px';

              // Проверяем столкновение на каждом шаге движения
              checkCollision();
          });

          function checkCollision() {
              const playerRect = player.getBoundingClientRect();
              const finishRect = finish.getBoundingClientRect();
              const containerRect = gameContainer.getBoundingClientRect();

              // Проверка выхода за границы лабиринта
              if (playerRect.left < containerRect.left ||
                  playerRect.right > containerRect.right ||
                  playerRect.top < containerRect.top ||
                  playerRect.bottom > containerRect.bottom) {
                  endGame(false);
                  return;
              }

              // Проверка столкновения со стенами
              for (let wall of walls) {
                  const wallRect = wall.getBoundingClientRect();
                  if (isIntersecting(playerRect, wallRect)) {
                      endGame(false);
                      return;
                  }
              }

              // Проверка достижения финиша
              if (isIntersecting(playerRect, finishRect)) {
                  endGame(true);
                  return;
              }
          }

          function isIntersecting(a, b) {
              return a.right > b.left && a.left < b.right && a.bottom > b.top && a.top < b.bottom;
          }

          function endGame(isWin) {
              isGameActive = false; // Останавливаем игру

              if (isWin) {
                  msgText.textContent = "Победа!";
                  messageOverlay.style.backgroundColor = "rgba(46, 125, 50, 0.7)";
              } else {
                  msgText.textContent = "Стена! Попробуй снова.";
                  messageOverlay.style.backgroundColor = "rgba(173, 34, 34, 0.7)";
              }
              messageOverlay.style.display = 'flex';
          }

          function resetGame() {
              initGame(); // Генерируем новый лабиринт и сбрасываем игру
          }

          // Запускаем игру при загрузке страницы
          initGame();
    </script>
</body>
</html>
