<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считаем котов!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #faf0e6;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Разносим элементы */
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        h1, #question {
            color: #8b4513;
            text-align: center;
            z-index: 2;
        }

        /* --- ЗОНА ДЛЯ КОТОВ ---
           Занимает всё пространство над цифрами */
        .game-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 35%; /* Котам доступна верхняя часть экрана */
            pointer-events: none; /* Клик проходит сквозь пустые места */
        }

        .cat-picture {
            position: absolute;
            width: 170px; /* Крупные коты */
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            opacity: 0.95;
            user-select: none;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .cat-picture:hover {
            transform: scale(1.08) rotate(-2deg);
            z-index: 20;
        }

        /* --- БЛОК С ЦИФРАМИ ---
           Располагаем внизу экрана */
        #numbers {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Сетка 3x3 */
            gap: 30px;
            
            bottom: 1%;
            left: 10%;
            transform: translateX(-50%);
            
            position: fixed;
            pointer-events: auto;
            z-index: 1; /* Ниже котов */
            background-color: rgba(255,255,255,0.8);
            padding: 15px;
            border-radius: 20px;
        }

        button {
            font-size: 2.5em; /* Очень крупные цифры */
            padding: 15px 25px;
            border-radius: 18px;
            border: none;
            background-color: #fff8dc;
            color: #a0522d;
            cursor: pointer;
            box-shadow: 0 6px #d2691e;
            transition: all 0.3s ease;
            min-width: 80px;
        }

        button.correct {
             background-color: #98fb98;
             color: #2e7d32;
             box-shadow: 0 6px #4CAF50;
        }

        button.wrong {
             background-color: #ff6347;
             color: white;
             box-shadow: 0 6px #FF4500;
        }
    </style>
</head>
<body>

    <h1>Считаем котов!</h1>

    <!-- Контейнер для зоны с котами -->
    <div class="game-area"></div>

    <div id="question">Сколько котов на крыше?</div>

    <!-- Блок для цифр будет создан скриптом здесь -->
    <div id="numbers"></div>

    <script>
        const gameArea = document.querySelector('.game-area');
        const questionEl = document.getElementById('question');
        const numbersEl = document.getElementById('numbers');

        let correctAnswer;
        const catSize = 170;
        const MAX_ATTEMPTS = 100;

        function startGame() {
            // Очистка предыдущего раунда
            gameArea.innerHTML = '';
            numbersEl.innerHTML = '';
            questionEl.textContent = "Сколько котов на крыше?";
            questionEl.style.color = "#333";

            // Генерация нового ответа
            correctAnswer = Math.floor(Math.random() * (9 - 1 + 1)) + 1;

            // Массив для хранения позиций уже размещенных котов
            const placedCats = [];

            // Создаем котов
            for (let i = 0; i < correctAnswer; i++) {
                let attempts = 0;
                let validPositionFound = false;
                let newCatPos;

                while (!validPositionFound && attempts < MAX_ATTEMPTS) {
                    attempts++;

                    // Генерируем случайную позицию внутри игровой зоны
                    const xPos = Math.random() * (window.innerWidth - catSize);
                    const yPos = Math.random() * (gameArea.clientHeight - catSize);

                    newCatPos = { x: xPos, y: yPos };

                    // Проверяем столкновение с другими котами
                    if (placedCats.length === 0) {
                        validPositionFound = true;
                    } else {
                        let noCollision = true;
                        for (const pos of placedCats) {
                            const overlapX = newCatPos.x < pos.x + catSize && newCatPos.x + catSize > pos.x;
                            const overlapY = newCatPos.y < pos.y + catSize && newCatPos.y + catSize > pos.y;
                            if (overlapX && overlapY) {
                                noCollision = false;
                                break;
                            }
                        }
                        validPositionFound = noCollision;
                    }
                }

                // Если позиция найдена, добавляем кота
                if (validPositionFound) {
                    placedCats.push(newCatPos);

                    const img = document.createElement('img');
                    img.src = `https://placekitten.com/${catSize}/${catSize}`; // Один источник для простоты
                    img.classList.add('cat-picture');
                    img.style.left = `${newCatPos.x}px`;
                    img.style.top = `${newCatPos.y}px`;
                    gameArea.appendChild(img);
                }
            }

            // Создаем кнопки с цифрами ПОСЛЕ того, как создали котов
            for (let num = 1; num <= 9; num++) {
                const btn = document.createElement('button');
                btn.textContent = num;
                btn.value = num;

                btn.addEventListener('click', function () {
                    if (parseInt(this.value) === correctAnswer) {
                        this.classList.add('correct');
                        questionEl.textContent = "🎉 Верно!";
                        questionEl.style.color = "#2e7d32";
                    } else {
                        this.classList.add('wrong');
                        questionEl.textContent = `😿 Неправильно! Было ${correctAnswer}.`;
                        questionEl.style.color = "#c62828";
                    }
                    document.querySelectorAll('#numbers button').forEach(b => b.disabled = true);
                    setTimeout(startGame, 2000);
                });
                numbersEl.appendChild(btn);
            }
        }

        // Старт игры после полной загрузки страницы
        window.onload = startGame;
    </script>
</body>
</html>
