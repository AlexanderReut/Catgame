

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой Лабиринт</title>
    <style>
        /* Убираем поля и полосы прокрутки */
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Стиль для холста, чтобы он занимал весь экран */
        canvas {
            background-color: #ffffff;
            touch-action: none; /* Отключаем стандартное поведение браузера при касаниях (прокрутка, зум) */
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    // --- Инициализация ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Подгоняем размер холста под размер окна (для планшетов)
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // --- Настройки игры ---
    const gridSize = 40; // Размер одной клетки лабиринта
    const playerSize = gridSize * 0.6; // Размер игрока (чуть меньше клетки)

    // Позиция игрока (начало в левом верхнем углу)
    let playerX = gridSize / 2;
    let playerY = gridSize / 2;

    // Скорость движения (в клетках за кадр)
    const speed = 5;

    // Координаты финиша (внизу справа)
    const goalX = canvas.width - gridSize * 1.5;
    const goalY = canvas.height - gridSize * 1.5;

    // --- Определение стен лабиринта ---
    // Функция проверяет, является ли точка (x, y) частью стены.
    // Координаты передаются в пикселях.
    function isWall(x, y) {
        // Внешние границы
        if (x < gridSize || x > canvas.width - gridSize ||
            y < gridSize || y > canvas.height - gridSize) {
            return true;
        }

        // Внутренние стенки (простой лабиринт)
        // Горизонтальная стенка посередине
        if (y > canvas.height / 2 - gridSize / 2 && y < canvas.height / 2 + gridSize / 2) {
            if (x > canvas.width / 3 && x < canvas.width * 2 / 3) {
                return true;
            }
        }

        // Вертикальная стенка справа
        if (x > canvas.width - gridSize * 2 && x < canvas.width - gridSize) {
            if (y > canvas.height / 3 && y < canvas.height * 2 / 3) {
                return true;
            }
        }

        return false;
    }

    // --- Отрисовка ---
    function draw() {
        // Очищаем холст
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Рисуем финиш (зеленая зона)
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(goalX, goalY, playerSize, playerSize);

        // Рисуем игрока (красный квадрат)
        ctx.fillStyle = '#F44336';
        ctx.fillRect(playerX - playerSize / 2, playerY - playerSize / 2, playerSize, playerSize);

        // Запрашиваем следующий кадр анимации
        requestAnimationFrame(draw);
    }

    // --- Логика движения ---
    let targetX = playerX;
    let targetY = playerY;

    function movePlayer() {
        // Плавное движение к точке касания

        // Двигаем по X
        if (playerX < targetX) {
            let newX = playerX + speed;
            if (!isWall(newX + playerSize / 2, playerY)) {
                playerX = newX;
            }
        } else if (playerX > targetX) {
            let newX = playerX - speed;
            if (!isWall(newX - playerSize / 2, playerY)) {
                playerX = newX;
            }
        }

        // Двигаем по Y
        if (playerY < targetY) {
            let newY = playerY + speed;
            if (!isWall(playerX, newY + playerSize / 2)) {
                playerY = newY;
            }
        } else if (playerY > targetY) {
            let newY = playerY - speed;
            if (!isWall(playerX, newY - playerSize / 2)) {
                playerY = newY;
            }
        }

        // Проверка победы: игрок достиг финиша?
        if (
            playerX + playerSize / 2 > goalX &&
            playerX - playerSize / 2 < goalX + playerSize &&
            playerY + playerSize / 2 > goalY &&
            playerY - playerSize / 2 < goalY + playerSize
        ) {
             alert("Поздравляем! Вы прошли лабиринт!");
             // Сброс позиции игрока после победы
             playerX = gridSize / 2;
             playerY = gridSize / 2;
             targetX = playerX;
             targetY = playerY;
         }
    }

    // --- Обработка касаний ---
    canvas.addEventListener('touchstart', function(e) {
        e.preventDefault(); // Предотвращаем прокрутку страницы пальцем
        const touch = e.touches[0];
        setTarget(touch);
    });

    canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        const touch = e.touches[0];
        setTarget(touch);
    });

    function setTarget(touch) {
         // Координаты касания относительно холста
         const rect = canvas.getBoundingClientRect();
         targetX = touch.clientX - rect.left;
         targetY = touch.clientY - rect.top;
     }


    // --- Запуск игры ---
    setInterval(movePlayer, 16); // ~60 кадров в секунду для движения
    draw(); // Запуск цикла отрисовки

</script>
</body>
</html>
