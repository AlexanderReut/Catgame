<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рисуем животных</title>
    <style>
        /* --- СТИЛИ СТРАНИЦЫ --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            background-color: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        /* --- СТИЛИ ХОЛСТА И РИСОВАНИЯ --- */
        canvas {
            touch-action: none; /* Отключаем стандартное поведение браузера при касании */
            cursor: crosshair;
            border: 2px solid #ddd;
            background-color: #fffaf0;
            image-rendering: pixelated; /* Для четких линий */
        }

        /* --- СТИЛИ КНОПКИ --- */
        button#clearBtn {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #ff9a00;
            color: white;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        button#clearBtn:hover {
            opacity: 0.9;
        }

        /* --- БЛОК РЕЗУЛЬТАТА --- */
        #resultBox {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
        }
        #label {
            color: #2c3e50;
        }
        #confidence {
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Нарисуй животное пальцем!</h1>
    <p>Попробуй нарисовать кошку или собаку.</p>

    <!-- Холст для рисования -->
    <canvas id="drawingCanvas"></canvas>

    <!-- Кнопка очистки холста -->
    <button id="clearBtn">Очистить</button>

    <!-- Блок для вывода результата предсказания -->
    <div id="resultBox">
        <span id="label"></span><br>
        <span id="confidence"></span>
    </div>
</div>

<!-- Библиотека TensorFlow.js (нужна для работы модели) -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>

<script>
// --- НАЧАЛО СКРИПТА ---
const canvas = document.getElementById('drawingCanvas');
const ctx = canvas.getContext('2d');
const clearBtn = document.getElementById('clearBtn');
const labelSpan = document.getElementById('label');
const confidenceSpan = document.getElementById('confidence');

// Устанавливаем размер холста адаптивно
function resizeCanvas() {
    const containerWidth = document.querySelector('.container').clientWidth - 40; // Учитываем padding
    canvas.width = containerWidth * 0.9;
    canvas.height = canvas.width / 2; // Соотношение сторон 2:1
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Настройки кисти
ctx.lineCap = 'round';
ctx.strokeStyle = '#000'; // Тонкие черные линии
ctx.lineWidth = 8;

let isDrawing = false;
let lastX = 0;
let lastY = 0;

// Получение координат касания/мыши
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches) { // Сенсорный ввод
        return [e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top];
    } else { // Десктопный ввод
        return [e.clientX - rect.left, e.clientY - rect.top];
    }
}

// Функции событий рисования
function startDraw(e) {
    isDrawing = true;
    [lastX, lastY] = getPos(e);
}
function draw(e) {
    if (!isDrawing) return;
    const [x, y] = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();
    [lastX, lastY] = [x, y];
}
function stopDraw() {
    isDrawing = false;
    predict(); // Запускаем распознавание после того, как палец поднят
}

// Добавляем обработчики для сенсорных устройств и мыши
canvas.addEventListener('touchstart', startDraw);
canvas.addEventListener('touchmove', draw);
canvas.addEventListener('touchend', stopDraw);
canvas.addEventListener('touchcancel', stopDraw);

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseout', stopDraw);

// Очистка холста
clearBtn.addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    labelSpan.textContent = '';
    confidenceSpan.textContent = '';
});

// --- ЛОГИКА РАСПОЗНАВАНИЯ ---
async function predict() {
    // Проверяем, не пустой ли холст
    if (ctx.getImageData(0, 0, 1, 1).data.every(v => v === 255)) {
        console.log("Холст пуст");
        return;
    }

    // URL вашей модели из Teachable Machine
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/hm5Qb7VvM/";

    try {
        // Загружаем модель и метаданные
        const model = await tf.loadGraphModel(MODEL_URL + 'model.json');
        const metadata = await fetch(MODEL_URL + 'metadata.json').then(r => r.json());

        // Подготовка изображения для нейросети
        const img = new Image();
        img.src = canvas.toDataURL();
        await img.decode();

        const tensor = tf.browser.fromPixels(img)
            .resizeBilinear([224, 224]) // Приводим к размеру, на котором училась модель
            .expandDims(0) // Добавляем измерение batch
            .toFloat()
            .div(tf.scalar(127))
            .sub(tf.scalar(1));

        // Делаем предсказание
        const predictions = await model.predict(tensor);
        const results = Array.from(predictions.dataSync());

        // Находим самый вероятный класс
        const maxIndex = results.indexOf(Math.max(...results));
        const predictedLabel = metadata.labels[maxIndex];
        const confidence = (Math.max(...results) * 100).toFixed(2);

        // Выводим результат на экран
        labelSpan.textContent = `Это ${predictedLabel}`;
        confidenceSpan.textContent = `(уверенность ${confidence}%)`;

        // Освобождаем память GPU
        tensor.dispose();
        predictions.dispose();

    } catch (error) {
        console.error("Ошибка загрузки модели:", error);
        alert("Не удалось загрузить модель распознавания. Проверьте консоль разработчика.");
    }
}
</script>

</body>
</html>
