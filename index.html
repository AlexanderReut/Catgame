<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабиринт: Исправленная версия</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 400px;
            background-color: #fff;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            touch-action: none; /* Отключает стандартное поведение браузера */
        }

        .wall {
            position: absolute;
            background-color: #333;
        }

        #player {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #ff5722;
            border-radius: 50%;
        }

        #finish {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #4caf50;
            border-radius: 50%;
        }

        /* Зона управления (виртуальный джойстик) */
        #control-pad {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            height: 80px; /* Высота зоны управления */
            background-color: rgba(255, 255, 255, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #message-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 28px;
            text-align: center;
        }

        #message-overlay button {
            margin-top: 20px;
            padding: 12px 30px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Элементы лабиринта генерируются здесь -->

        <div id="player"></div>
        <div id="finish"></div>

        <!-- Зона для управления -->
        <div id="control-pad"></div>

        <div id="message-overlay">
            <p id="msg-text"></p>
            <button onclick="resetGame()">Начать заново</button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const player = document.getElementById('player');
        const finish = document.getElementById('finish');
        const controlPad = document.getElementById('control-pad');
        const messageOverlay = document.getElementById('message-overlay');
        const msgText = document.getElementById('msg-text');

        const GRID_SIZE = 10; // Размер сетки лабиринта
        const CELL_SIZE = gameContainer.clientWidth / GRID_SIZE; // Размер одной ячейки

        let walls = [];
        let isGameActive = true;

        // Переменные для управления
        let isTouching = false; // Флаг касания
        let baseX = 0; // Начальная точка касания (X)
        let baseY = 0; // Начальная точка касания (Y)

         // --- Инициализация игры ---
         function initGame() {
             // Очистка старых стен
             walls.forEach(wall => wall.remove());
             walls = [];

             // Генерация и отрисовка нового лабиринта
             const maze = generateMaze();
             createWallsFromMaze(maze);

             // Сброс игрока и финиша
             player.style.left = CELL_SIZE + 'px';
             player.style.top = CELL_SIZE + 'px';
             finish.style.left = (CELL_SIZE * (GRID_SIZE - 1)) + 'px';
             finish.style.top = (CELL_SIZE * (GRID_SIZE - 1)) + 'px';

             // Сброс состояния игры
             isGameActive = true;
             messageOverlay.style.display = 'none';
         }

         // --- Логика управления ---
         controlPad.addEventListener('touchstart', function(event) {
             if (!isGameActive) return resetGame();
             
             event.preventDefault();
             isTouching = true;
             
             // Запоминаем точку касания как центр джойстика
             const rect = controlPad.getBoundingClientRect();
             baseX = event.touches[0].clientX - rect.left - (player.offsetWidth / 2);
             baseY = event.touches[0].clientY - rect.top - (player.offsetHeight / 2);
         });

         controlPad.addEventListener('touchmove', function(event) {
             if (!isTouching || !isGameActive) return;
             event.preventDefault();

             // Вычисляем смещение пальца от центра
             const rect = controlPad.getBoundingClientRect();
             const touchX = event.touches[0].clientX - rect.left - (player.offsetWidth / 2);
             const touchY = event.touches[0].clientY - rect.top - (player.offsetHeight / 2);
             
             const deltaX = touchX - baseX;
             const deltaY = touchY - baseY;

             // Определяем направление движения по наибольшему смещению
             let speedX = 0, speedY = 0;
             if (Math.abs(deltaX) > Math.abs(deltaY)) {
                 // Горизонтальное движение
                 speedX = Math.sign(deltaX) * 5; // Скорость движения по X
                 speedY = 0; // Останавливаем движение по Y при смене направления
             } else {
                 // Вертикальное движение
                 speedX = 0; // Останавливаем движение по X при смене направления
                 speedY = Math.sign(deltaY) * 5; // Скорость движения по Y
             }

             // Обновляем позицию игрока с учетом скорости
             const newLeft = parseFloat(player.style.left || CELL_SIZE) + speedX;
             const newTop = parseFloat(player.style.top || CELL_SIZE) + speedY;
             
             player.style.left = newLeft + 'px';
             player.style.top = newTop + 'px';
             
             checkCollision();
         });

         controlPad.addEventListener('touchend', function() {
             isTouching = false; // Прекращаем управление, когда палец поднят
         });


         // --- Логика столкновений и генерации лабиринта (осталась без изменений) ---
         // ... (код из предыдущей версии для generateMaze, createWallsFromMaze, checkCollision и т.д.)
         // Для краткости он не повторяется здесь, но в полной версии он должен быть на месте.
         // Он был полностью скопирован из предыдущего ответа.
