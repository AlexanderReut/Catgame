<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Детский лабиринт</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
            touch-action: none; /* Отключаем стандартные жесты браузера */
        }
        #game-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
            border: 3px solid #4682b4;
            background-color: #fff;
            overflow: hidden;
        }
        .wall {
            position: absolute;
            background-color: #4682b4;
        }
        #player {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ff69b4;
            border-radius: 50%;
            z-index: 10;
        }
        #exit {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #32cd32;
            border-radius: 5px;
        }
        #message {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4682b4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Детский лабиринт</h1>
    <p>Проведи шарик к зелёному выходу!</p>
    
    <div id="game-container">
        <!-- Стены лабиринта -->
        <div class="wall" style="top: 0; left: 0; width: 300px; height: 10px;"></div>
        <div class="wall" style="top: 0; left: 0; width: 10px; height: 300px;"></div>
        <div class="wall" style="top: 0; left: 290px; width: 10px; height: 300px;"></div>
        <div class="wall" style="top: 290px; left: 0; width: 300px; height: 10px;"></div>
        <div class="wall" style="top: 50px; left: 50px; width: 200px; height: 10px;"></div>
        <div class="wall" style="top: 150px; left: 100px; width: 10px; height: 100px;"></div>
        <div class="wall" style="top: 240px; left: 50px; width: 200px; height: 10px;"></div>

        <!-- Игрок -->
        <div id="player"></div>
        
        <!-- Выход -->
        <div id="exit"></div>
    </div>
    
    <div id="message">Двигай шарик пальцем!</div>
    <button onclick="resetGame()">Начать заново</button>

    <script>
        const player = document.getElementById('player');
        const exit = document.getElementById('exit');
        const message = document.getElementById('message');
        const container = document.getElementById('game-container');
        
        // Начальные позиции
        let playerX = 20;
        let playerY = 20;
        const exitX = 265;
        const exitY = 265;
        const step = 10; // Увеличил шаг для лучшей отзывчивости

        // Инициализация игры
        function initGame() {
            player.style.left = playerX + 'px';
            player.style.top = playerY + 'px';
            exit.style.left = exitX + 'px';
            exit.style.top = exitY + 'px';
        }

        // Проверка столкновения со стенами
        function checkCollision(x, y) {
            const walls = document.querySelectorAll('.wall');
            for (let wall of walls) {
                const wallRect = wall.getBoundingClientRect();
                const playerRect = {
                    left: x,
                    top: y,
                    right: x + 20,
                    bottom: y + 20
                };
                
                if (
                    playerRect.right > wallRect.left &&
                    playerRect.left < wallRect.right &&
                    playerRect.bottom > wallRect.top &&
                    playerRect.top < wallRect.bottom
                ) {
                    return true;
                }
            }
            return false;
        }

        // Проверка победы
        function checkWin() {
            const playerRect = player.getBoundingClientRect();
            const exitRect = exit.getBoundingClientRect();
            
            if (
                playerRect.right > exitRect.left &&
                playerRect.left < exitRect.right &&
                playerRect.bottom > exitRect.top &&
                playerRect.top < exitRect.bottom
            ) {
                message.textContent = 'Поздравляем! Вы прошли лабиринт!';
                message.style.color = '#32cd32';
            }
        }

        // Движение игрока
        function movePlayer(dx, dy) {
            const newX = playerX + dx;
            const newY = playerY + dy;
            
            // Проверка границ контейнера
            if (newX < 0 || newX > 280 || newY < 0 || newY > 280) return;
            
            // Проверка столкновения
            if (!checkCollision(newX, newY)) {
                playerX = newX;
                playerY = newY;
                player.style.left = playerX + 'px';
                player.style.top = playerY + 'px';
                checkWin();
            }
        }

        // Улучшенное сенсорное управление
        let startX, startY;

        container.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Предотвращаем стандартные действия браузера
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        container.addEventListener('touchend', function(e) {
            e.preventDefault();
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            
            const diffX = endX - startX;
            const diffY = endY - startY;
            const threshold = 30; // Минимальный порог движения для распознавания свайпа

            // Определяем направление свайпа
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Горизонтальное движение
                if (Math.abs(diffX) > threshold) {
                    if (diffX > 0) movePlayer(step, 0); // Вправо
                    else movePlayer(-step, 0); // Влево
                }
            } else {
                // Вертикальное движение
                if (Math.abs(diffY) > threshold) {
                    if (diffY > 0) movePlayer(0, step); // Вниз
                    else movePlayer(0, -step); // Вверх
                }
            }
        });

        // Обработка кликов для тестирования на ПК
        container.addEventListener('click', function(e) {
            const rect = container.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            // Двигаем к месту клика с небольшой коррекцией
            movePlayer(
                Math.sign(clickX - playerX) * step,
                Math.sign(clickY - playerY) * step
            );
        });
